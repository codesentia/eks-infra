name: Deploy iam-node-role-dev (change set)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - iam/**

permissions:
  id-token: write
  contents: read

jobs:
  changeset:
    name: Create iam-node-role-dev change set
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - run: make deploy-node-role-dev
